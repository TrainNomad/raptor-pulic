<style type="text/tailwindcss">
  :root {
    --midnight-blue: #1A2B3C;
    --green-highlight: #4ade80;
    --bg-gray: #F8FAFC;
  }
  body { font-family:'Plus Jakarta Sans',sans-serif; background-color:var(--bg-gray); color:var(--midnight-blue); }
  .search-bar-shadow { box-shadow: 0 4px 20px -2px rgba(26,43,60,.05); }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24 }
  .text-primary { color: #4ade80; }
  .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; }
  .status-dot.ok { background:#4ade80; }
  .status-dot.loading { background:#f59e0b; animation:pulse 1s infinite; }
  .status-dot.err { background:#f87171; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* autocomplete */
  .input-ac-wrapper { position: relative; }
  input[type="date"]::-webkit-calendar-picker-indicator { display: none; -webkit-appearance: none; }
  .suggestions-container {

<style>
/* ── Layout explorer — carte plein écran ── */
#explorer-main {
  position: relative;
  height: calc(100vh - 128px);
  overflow: hidden;
}

/* ── Carte plein écran en fond ── */
#map-container { position: absolute; inset: 0; z-index: 0; }
#map { width: 100%; height: 100%; }

/* ── Panneau latéral flottant ── */
#side-panel {
  position: absolute; top: 16px; left: 16px; bottom: 16px; width: 320px;
  z-index: 10;
  background: rgba(255,255,255,.94);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-radius: 18px; border: 1px solid rgba(241,245,249,.8);
  box-shadow: 0 8px 32px rgba(26,43,60,.12);
  display: flex; flex-direction: column; overflow: hidden;
  transition: transform .3s ease, opacity .3s ease;
}
#side-panel.collapsed { transform: translateX(calc(-100% - 20px)); opacity: 0; pointer-events: none; }

#panel-header { padding: 16px 20px 12px; border-bottom: 1px solid #f1f5f9; flex-shrink: 0; }
.panel-title { font-size: 13px; font-weight: 800; color: var(--midnight-blue); text-transform: uppercase; letter-spacing: .1em; }
#results-count-row { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
#results-count-label { font-size: 12px; font-weight: 500; color: #94a3b8; }
#results-count { font-size: 13px; font-weight: 800; color: var(--midnight-blue); }

/* ── Filtres ── */
#filters-bar {
  padding: 10px 16px; border-bottom: 1px solid #f1f5f9;
  display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0;
  opacity: 0; pointer-events: none; transition: opacity .3s;
}
#filters-bar.visible { opacity: 1; pointer-events: all; }
.filter-chip {
  padding: 4px 12px; border-radius: 999px; border: 1.5px solid #e2e8f0;
  font-size: 11px; font-weight: 700; color: #64748b;
  cursor: pointer; transition: all .15s; background: #fff; white-space: nowrap;
}
.filter-chip:hover { border-color: var(--midnight-blue); color: var(--midnight-blue); }
.filter-chip.active { background: var(--midnight-blue); color: #fff; border-color: var(--midnight-blue); }

/* ── Liste résultats ── */
#results-list { flex: 1; overflow-y: auto; padding: 8px 0; }
#results-list::-webkit-scrollbar { width: 4px; }
#results-list::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
.result-card {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px; cursor: pointer; transition: background .1s;
  border-left: 3px solid transparent;
}
.result-card:hover, .result-card.hovered { background: rgba(26,43,60,.04); border-left-color: var(--midnight-blue); }
.result-card.highlighted { background: rgba(74,222,128,.08); border-left-color: var(--green-highlight); }
.result-dot-badge { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 2px rgba(255,255,255,.6); }
.result-info { flex: 1; min-width: 0; }
.result-city { font-size: 13px; font-weight: 700; color: var(--midnight-blue); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-meta { font-size: 11px; color: #94a3b8; margin-top: 2px; display: flex; gap: 6px; align-items: center; }
.result-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: #cbd5e1; display: inline-block; }
.result-right { text-align: right; flex-shrink: 0; }
.result-time { font-size: 13px; font-weight: 800; color: var(--midnight-blue); }
.result-transfers { font-size: 10px; font-weight: 700; color: #4ade80; letter-spacing: .06em; margin-top: 1px; }
.result-train-type { font-size: 10px; font-weight: 600; color: #94a3b8; margin-top: 1px; }

/* ── Map hint ── */
#map-hint {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center; pointer-events: none; z-index: 10;
  background: rgba(255,255,255,.92); backdrop-filter: blur(8px);
  border-radius: 20px; padding: 32px 40px;
  box-shadow: 0 8px 32px rgba(26,43,60,.1); border: 1px solid #f1f5f9;
}
.hint-icon { font-size: 40px; margin-bottom: 12px; }
.hint-title { font-size: 16px; font-weight: 800; color: var(--midnight-blue); margin-bottom: 6px; }
.hint-sub { font-size: 13px; color: #94a3b8; font-weight: 500; }

/* ── Progress bar ── */
#progress-bar {
  position: absolute; top: 0; left: 0; height: 3px;
  background: linear-gradient(90deg, #4ade80, #1A2B3C);
  width: 0; z-index: 20; transition: width .4s ease; border-radius: 0 2px 2px 0;
}

/* ── Contrôles Leaflet toujours visibles ── */
.leaflet-control-container { z-index: 20 !important; }
.leaflet-bottom { z-index: 20 !important; }
.leaflet-control-zoom,
.leaflet-control-scale { z-index: 20 !important; position: relative; }

/* ── Popup Leaflet AU DESSUS de tout ── */
.leaflet-popup-pane { z-index: 900 !important; }
.leaflet-popup-content-wrapper {
  padding: 0 !important; border-radius: 14px !important; overflow: hidden;
  box-shadow: 0 16px 48px rgba(26,43,60,.25) !important;
  border: 1px solid #f1f5f9;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.leaflet-popup-content { margin: 0 !important; }
.leaflet-popup-close-button { font-size: 16px !important; padding: 6px 10px !important; color: #94a3b8 !important; top: 4px !important; right: 4px !important; }

/* ── Légende durée ── */
#duration-legend {
  position: absolute; bottom: 48px; right: 12px; z-index: 30;
  background: rgba(255,255,255,.95); backdrop-filter: blur(8px);
  border-radius: 12px; padding: 12px 16px;
  box-shadow: 0 4px 16px rgba(26,43,60,.1); border: 1px solid #f1f5f9; min-width: 180px;

.legend-title { font-size: 10px; font-weight: 800; color: #94a3b8; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }
.legend-gradient {
  height: 8px; border-radius: 4px;
  background: linear-gradient(90deg, rgb(40,180,40) 0%, rgb(180,210,30) 20%, rgb(240,200,20) 40%, rgb(230,90,20) 60%, rgb(180,20,20) 80%, rgb(80,0,0) 100%);
}
.legend-labels { display: flex; justify-content: space-between; margin-top: 5px; font-size: 10px; font-weight: 600; color: #94a3b8; }

/* ── Origin marker ── */
.origin-pin { width: 18px; height: 18px; border-radius: 50%; background: #1A2B3C; border: 3px solid #fff; box-shadow: 0 2px 8px rgba(26,43,60,.4); }

/* ── Toggle sidebar btn ── */

<script>
// ─── Autocomplétion ───────────────────────────────────────────────────────────
const API_BASE = 'https://raptor-backend-2vdj.onrender.com';
let acTimers = {};

const AC_COUNTRY_NAMES = {
  FR:'France', IT:'Italie', BE:'Belgique', DE:'Allemagne',
  NL:'Pays-Bas', GB:'Royaume-Uni', ES:'Espagne', PT:'Portugal',
  CH:'Suisse', AT:'Autriche', PL:'Pologne', CZ:'Tchéquie', SK:'Slovaquie',
};

function setupAutocomplete(inputId, acId, hiddenId, stateKey, stateObj, onSelect) {
  const input  = document.getElementById(inputId);
  const ac     = document.getElementById(acId);
  const hidden = document.getElementById(hiddenId);
  let acIndex = -1, items = [];

  const close = () => { ac.classList.add('hidden'); ac.innerHTML = ''; acIndex = -1; items = []; };

  input.addEventListener('input', () => {
    clearTimeout(acTimers[inputId]);
    const q = input.value.trim();
    stateObj[stateKey] = null;
    hidden.value = '';
    if (onSelect) onSelect();
    if (q.length < 2) { close(); return; }
    acTimers[inputId] = setTimeout(async () => {
      try {
        const res   = await fetch(`${API_BASE}/api/stops?q=${encodeURIComponent(q)}`);
        const stops = await res.json();
        if (!stops.length) { close(); return; }
        const cityOrder = [], cityMap = new Map();
        for (const stop of stops) {
          const city = stop.city || stop.name, country = stop.country || 'FR';
          const countryName = AC_COUNTRY_NAMES[country] || country;
          const key = city + ':' + country;
          if (!cityMap.has(key)) { cityMap.set(key, { city, countryName, stops: [] }); cityOrder.push(key); }
          cityMap.get(key).stops.push(stop);
        }
        ac.innerHTML = ''; acIndex = -1; items = [];
        for (const key of cityOrder) {
          const { countryName, stops: gs } = cityMap.get(key);
          for (const stop of gs) {
            const div = document.createElement('div');
            div.className = 'ac-row'; div.setAttribute('data-ac-index', items.length);
            div.innerHTML = `<span class="ac-row-name">${escapeHtml(stop.name)}</span><span class="ac-row-country">${escapeHtml(countryName)}</span>`;
            div.addEventListener('mousedown', e => { e.preventDefault(); selectStop(stop, input, hidden, stateKey, stateObj, onSelect); close(); });
            ac.appendChild(div); items.push(stop);
          }
        }
        ac.style.cssText = 'position:absolute;top:100%;left:0;right:0;z-index:1000;';
        ac.classList.remove('hidden');
      } catch (_) {}
    }, 180);
  });

  input.addEventListener('keydown', e => {
    if (!items.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); acIndex = Math.min(acIndex+1, items.length-1); highlight(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); acIndex = Math.max(acIndex-1, -1); highlight(); }
    else if (e.key === 'Enter') { e.preventDefault(); if (acIndex>=0 && items[acIndex]) { selectStop(items[acIndex], input, hidden, stateKey, stateObj, onSelect); close(); } }
    else if (e.key === 'Escape') close();
  });

  function highlight() {
    ac.querySelectorAll('[data-ac-index]').forEach(el =>
      el.classList.toggle('ac-active', parseInt(el.getAttribute('data-ac-index')) === acIndex));
  }
  input.addEventListener('blur', () => setTimeout(close, 150));
}

function selectStop(stop, input, hidden, stateKey, stateObj, onSelect) {
  input.value = stop.name;
  hidden.value = (stop.stopIds?.length) ? stop.stopIds.join(',') : (stop.id || '');
  stateObj[stateKey] = { ...stop, stopIds: stop.stopIds || [stop.id] };
  if (onSelect) onSelect();
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>

<script src="Script/explorer.js"></script>

<script>
// ─── Init date + autocomplete ────────────────────────────────────────────────
(function() {
  const t = new Date();
  const iso = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  document.getElementById('date-input').min = iso;
  // Lire les paramètres URL si on vient de index.html
  const params = new URLSearchParams(window.location.search);
  document.getElementById('date-input').value = params.get('date') || iso;
})();

const explorerState = { from: null };

setupAutocomplete('input-from', 'ac-from', 'id-from', 'from', explorerState, () => {
  const s = explorerState.from;
  if (s?.lat && s.lon) map.flyTo({ center: [s.lon, s.lat], zoom: 6, duration: 1200 });
});

// ─── Pré-remplir depuis index.html (?from=...&fromName=...&date=...) ──────────
(function() {
  const params   = new URLSearchParams(window.location.search);
  const fromId   = params.get('from');
  const fromName = params.get('fromName');
  if (!fromId || !fromName) return;

  // Pré-remplir le champ texte et l'état immédiatement
  document.getElementById('input-from').value = fromName;
  document.getElementById('id-from').value    = fromId;
  explorerState.from = { name: fromName, stopIds: fromId.split(','), id: fromId };

  // Lancer la recherche après que Leaflet soit prêt
  map.whenReady(() => setTimeout(doSearch, 300));
})();

// ─── Filtres ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    refreshView();
  });
});

// ─── Search btn ──────────────────────────────────────────────────────────────
function doSearch() {
  const s = explorerState.from;
  if (!s) {
    const inp = document.getElementById('input-from');
    inp.focus(); inp.style.outline = '2px solid #f87171';
    setTimeout(() => inp.style.outline = '', 900);
    return;
  }
  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Recherche…';
  clearMap(); setProgress(10);

  const fromIds = (s.stopIds || [s.id]).join(',');
  const dateStr = document.getElementById('date-input').value;

  fetchDestinations(fromIds, dateStr)
    .catch(e => { showNoResults('Erreur : ' + e.message); document.getElementById('status-dot').className = 'status-dot err'; document.getElementById('status-text').textContent = e.message; })
    .finally(() => {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i> Explorer';
      setProgress(100); setTimeout(() => setProgress(0), 500);
    });
}

// ─── Toggle sidebar ───────────────────────────────────────────────────────────
function togglePanel() {
  const panel = document.getElementById('side-panel');
  const btn   = document.getElementById('toggle-panel-btn');
  const lbl   = document.getElementById('toggle-label');
  const collapsed = panel.classList.toggle('collapsed');
  lbl.textContent = collapsed ? 'Afficher' : 'Masquer';
  btn.style.left  = collapsed ? '16px' : '352px';
}
</script>
